<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>untitled</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="title-screen">
  <div class="title-sub">천상의 이야기</div>
  <div class="title-main">untitled</div>
  <button class="title-btn" id="btn-start">시작하기</button>
</div>
<div id="gender-screen" class="hidden">
  <div class="gender-q">당신은 누구입니까?</div>
  <div class="gender-choices">
    <button class="gender-btn" data-gender="f">딸</button>
    <button class="gender-btn" data-gender="m">아들</button>
  </div>
</div>
<div id="game-screen" class="hidden">
  <div id="scene-bar">
    <div id="scene-desc"></div>
    <button id="btn-panel">◈</button>
  </div>
  <div id="dialogue-log"></div>
  <div id="choices" class="hidden"></div>
  <div id="bottom-bar">
    <div id="affinity-bar"></div>
    <button id="btn-next">›</button>
  </div>
</div>
<div id="aff-notif" class="hidden"></div>
<!-- 통합 패널 -->
<div id="side-panel" class="hidden">
  <div id="side-panel-header">
    <span>현황</span>
    <button id="btn-panel-close">✕</button>
  </div>
  <div id="side-panel-body">
    <!-- 코인 -->
    <div id="panel-coin-row">
      <span id="panel-coin-label">코인</span>
      <span id="panel-coin-val">0 C</span>
    </div>
    <!-- 스탯 -->
    <div id="stat-list"></div>
    <!-- 구분선 -->
    <div id="panel-divider"></div>
    <!-- 아이템 -->
    <div id="item-list">
      <div class="item-empty">아직 아이템이 없습니다.</div>
    </div>
  </div>
</div>
<div id="panel-overlay" class="hidden"></div>
<!-- 아이템 상세 팝업 -->
<div id="item-popup" class="hidden">
  <div id="item-popup-inner">
    <div id="item-popup-name"></div>
    <div id="item-popup-desc"></div>
  </div>
</div>
<div id="item-popup-overlay" class="hidden"></div>
<script src="../items/items_prologue.js"></script>
<script src="data.js"></script>
<script src="ui.js"></script>
<script src="../scenario/prologue.js"></script>
<script src="game.js"></script>
</body>
</html>
